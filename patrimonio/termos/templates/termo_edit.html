<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ titulo }}</title>

    <style>
    input:disabled, select:disabled {
    background: #f1f5f9;
    color: #64748b;
    cursor: not-allowed;
  }
      body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        margin: 0;
        padding: 0;
      }

      .container {
        max-width: 900px;
        margin: 30px auto;
        background: #fff;
        padding: 24px;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0,0,0,.08);
      }

      h1 {
        margin: 0 0 18px 0;
        text-align: center;
        font-size: 22px;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      @media (max-width: 760px) {
        .grid { grid-template-columns: 1fr; }
      }

      .field label {
        display: block;
        font-weight: 700;
        margin-bottom: 6px;
      }

      .field input, .field select {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #cfcfcf;
        outline: none;
      }

      .readonly {
        background: #f3f4f6;
        color: #374151;
      }

      .actions {
        margin-top: 18px;
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .btn {
        padding: 10px 14px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-weight: 700;
        text-decoration: none;
        display: inline-block;
      }

      .btn-primary { background: #2b6cb0; color: white; }
      .btn-secondary { background: #e5e7eb; color: #111827; }

      .errors {
        margin-top: 10px;
        background: #fff4f4;
        border: 1px solid #ffbdbd;
        padding: 10px;
        border-radius: 8px;
        color: #8a1f1f;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>{{ titulo }}</h1>

      {% if form.errors %}
      <div class="errors">
        <strong>Corrija os campos abaixo:</strong>
        {{ form.errors }}
      </div>
      {% endif %}

      <form method="post" data-tab="1">
        {% csrf_token %}
        <input type="hidden" name="tab" value="{{ request.GET.tab }}" />

        <div class="grid">
          <!-- BLOQUEADOS (cinza) -->
          <div class="field">
            <label>Data de Retirada</label>
            <input class="readonly" type="text" value="{{ termo.data_retirada|date:'d/m/Y' }}" disabled />
          </div>

          <div class="field">
            <label>Destino</label>
            <input class="readonly" type="text" value="{{ termo.destino }}" disabled />
          </div>

          <div class="field">
            <label>Responsável</label>
            <input class="readonly" type="text" value="{{ termo.responsavel }}" disabled />
          </div>

          <div class="field">
            <label>Produto</label>
            <input class="readonly" type="text" value="{{ termo.produto }}" disabled />
          </div>

          <div class="field">
            <label>Patrimônio</label>
            <input class="readonly" type="text" value="{{ termo.patrimonio }}" disabled />
          </div>

          <!-- EDITÁVEIS -->
          <div class="field">
            <label for="{{ form.status.id_for_label }}">Status</label>
            {{ form.status }}
          </div>

          <div class="field">
            <label for="{{ form.data_devolucao.id_for_label }}">Data de Devolução</label>
            {{ form.data_devolucao }}
          </div>
        </div>

        <div class="actions">
          <button class="btn btn-primary" type="submit">Salvar</button>
          <a class="btn btn-secondary" href="{% url 'termo_manage_list' %}">Voltar</a>
        </div>
      </form>
    </div>

    <script>
      (function () {
        const KEY = "ceperj_admin_tab";
        function getToken() {
          let t = sessionStorage.getItem(KEY);
          if (!t) {
            t = (crypto.randomUUID ? crypto.randomUUID() : (Math.random().toString(36).slice(2) + Date.now()));
            sessionStorage.setItem(KEY, t);
          }
          return t;
        }

        // injeta tab no submit
        document.querySelectorAll('form[data-tab="1"]').forEach((f) => {
          f.addEventListener("submit", () => {
            let input = f.querySelector('input[name="tab"]');
            if (!input) {
              input = document.createElement("input");
              input.type = "hidden";
              input.name = "tab";
              f.appendChild(input);
            }
            input.value = getToken();
          });
        });

        // Regra: data devolução só libera se status = DEVOLVIDO
        const statusEl = document.getElementById("id_status");
        const dataDevEl = document.getElementById("id_data_devolucao");

        function syncDataDev() {
          if (!statusEl || !dataDevEl) return;

          const val = statusEl.value;
          const devolvido = (val === "DEVOLVIDO");

          dataDevEl.disabled = !devolvido;

          if (!devolvido) {
            dataDevEl.value = "";
          }
        }

        if (statusEl && dataDevEl) {
          syncDataDev();
          statusEl.addEventListener("change", syncDataDev);
        }
      })();
    </script>
    <script>
  (function () {
    const statusEl = document.getElementById("id_status");
    const dataDevEl = document.getElementById("id_data_devolucao");

    if (!statusEl || !dataDevEl) return;

    function toggleDataDev() {
      const isDevolvido = statusEl.value === "DEVOLVIDO";
      dataDevEl.disabled = !isDevolvido;

      // Se voltar pra ABERTO, apaga a data na tela (backend também limpa)
      if (!isDevolvido) dataDevEl.value = "";
    }

    document.addEventListener("DOMContentLoaded", toggleDataDev);
    statusEl.addEventListener("change", toggleDataDev);

    // dispara já (caso carregue antes do DOMContentLoaded)
    toggleDataDev();
  })();
</script>

  </body>
</html>
