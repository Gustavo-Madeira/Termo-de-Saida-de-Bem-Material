<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ titulo }}</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        margin: 0;
        padding: 0;
      }

      .container {
        max-width: 900px;
        margin: 30px auto;
        background: #fff;
        padding: 24px;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0,0,0,.08);
      }

      h1 {
        margin: 0 0 18px 0;
        text-align: center;
        font-size: 22px;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      @media (max-width: 760px) {
        .grid { grid-template-columns: 1fr; }
      }

      .field label {
        display: block;
        font-weight: 700;
        margin-bottom: 6px;
      }

      .field input, .field select, .field textarea {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #cfcfcf;
        outline: none;
      }

      .field input:focus, .field select:focus, .field textarea:focus {
        border-color: #2b6cb0;
        box-shadow: 0 0 0 3px rgba(43,108,176,.15);
      }

      /* destino sempre “parece” maiúsculo enquanto digita */
      #id_destino { text-transform: uppercase; }

      .errors {
        margin-top: 10px;
        background: #fff4f4;
        border: 1px solid #ffbdbd;
        padding: 10px;
        border-radius: 8px;
        color: #8a1f1f;
      }

      .actions {
        margin-top: 18px;
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .btn {
        padding: 10px 14px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-weight: 700;
        text-decoration: none;
        display: inline-block;
      }

      .btn-primary { background: #2b6cb0; color: white; }
      .btn-secondary { background: #e5e7eb; color: #111827; }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>{{ titulo }}</h1>

      {% if form.errors %}
      <div class="errors">
        <strong>Corrija os campos abaixo:</strong>
        {{ form.errors }}
      </div>
      {% endif %}

      <form method="post" data-tab="1">
        {% csrf_token %}

        <!-- token da aba (injetado via JS antes do submit também) -->
        <input type="hidden" name="tab" value="{{ request.GET.tab }}" />

        <div class="grid">
          <div class="field">
            <label for="{{ form.data_retirada.id_for_label }}">Data de Retirada</label>
            {{ form.data_retirada }}
          </div>

          <div class="field">
            <label for="{{ form.destino.id_for_label }}">Destino</label>
            {{ form.destino }}
          </div>

          <div class="field">
            <label for="{{ form.responsavel.id_for_label }}">Responsável</label>
            {{ form.responsavel }}
          </div>

          <div class="field">
            <label for="{{ form.produto.id_for_label }}">Produto</label>
            {{ form.produto }}
          </div>

          <div class="field">
            <label for="{{ form.patrimonio.id_for_label }}">Patrimônio</label>
            {{ form.patrimonio }}
          </div>
        </div>

        <div class="actions">
          <button class="btn btn-primary" type="submit">Salvar</button>
          <a class="btn btn-secondary" href="{% url 'home' %}">Voltar</a>
        </div>
      </form>
    </div>

    <script>
      (function () {
        const KEY = "ceperj_admin_tab";
        function getToken() {
          let t = sessionStorage.getItem(KEY);
          if (!t) {
            t = (crypto.randomUUID ? crypto.randomUUID() : (Math.random().toString(36).slice(2) + Date.now()));
            sessionStorage.setItem(KEY, t);
          }
          return t;
        }

        // força DESTINO virar maiúsculo no valor (não só visual)
        const destino = document.getElementById("id_destino");
        if (destino) {
          destino.addEventListener("input", () => {
            destino.value = destino.value.toUpperCase();
          });
        }

        // injeta tab no submit
        document.querySelectorAll('form[data-tab="1"]').forEach((f) => {
          f.addEventListener("submit", () => {
            let input = f.querySelector('input[name="tab"]');
            if (!input) {
              input = document.createElement("input");
              input.type = "hidden";
              input.name = "tab";
              f.appendChild(input);
            }
            input.value = getToken();
          });
        });
      })();
    </script>
  </body>
</html>
