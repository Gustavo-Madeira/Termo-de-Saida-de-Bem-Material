<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{font-family:Arial, sans-serif; background:#f6f7fb; margin:0; display:flex; min-height:100vh; align-items:center; justify-content:center;}
    .card{background:#fff; border:1px solid #e6e8ef; border-radius:16px; padding:18px; width:360px;}
    label{font-weight:700; display:block; margin:10px 0 6px;}
    input{width:100%; padding:10px 12px; border:1px solid #e6e8ef; border-radius:12px; font-size:14px;}
    .btn{margin-top:14px; width:100%; background:#0b1220; color:#fff; border:1px solid #0b1220; padding:10px 14px; border-radius:12px; font-weight:800; cursor:pointer;}
    .muted{color:#667085; font-size:13px;}
  </style>
</head>
<body>
  <form method="post" class="card">
    <h2 style="margin:0;">Login</h2>
    <p class="muted" style="margin:8px 0 0;">Acesso necessário para Registrar/Editar.</p>

    {% csrf_token %}
    {{ form.non_field_errors }}

    <label>Usuário</label>
    {{ form.username }}

    <label>Senha</label>
    {{ form.password }}

    <button class="btn" type="submit">Entrar</button>
  </form>
</body>
</html>
