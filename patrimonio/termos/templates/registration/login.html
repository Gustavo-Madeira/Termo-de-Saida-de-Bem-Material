<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login</title>
  <style>
    body{font-family:Arial;margin:24px;display:flex;justify-content:center}
    .card{width:360px;border:1px solid #ddd;border-radius:12px;padding:18px;margin-top:40px}
    label{display:block;margin-top:12px}
    input{width:100%;padding:10px;border:1px solid #ccc;border-radius:10px}
    button{margin-top:16px;width:100%;padding:10px;border:1px solid #111;border-radius:10px;background:#111;color:#fff}
    .err{color:#b00;margin-top:10px}
  </style>
</head>
<body>
  <div class="card">
    <h2>Entrar</h2>

    {% if form.errors %}
      <div class="err">Usuário ou senha inválidos.</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <label>Usuário</label>
      {{ form.username }}
      <label>Senha</label>
      {{ form.password }}
      <button type="submit">Entrar</button>
    </form>
  </div>
</body>
</html>
